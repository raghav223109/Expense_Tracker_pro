{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto">

<section class="bg-slate-800
rounded-2xl p-6">

<h1 class="text-3xl
font-bold mb-6">

Verify Email

</h1>

<p class="text-slate-400 mb-4">

Enter the OTP sent to your email.

</p>

<form method="POST"
class="space-y-4">

<input type="text"
name="otp"
placeholder="Enter OTP"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<button class="w-full
bg-cyan-500
rounded-xl py-3">

Verify Account

</button>

</form>

</section>

</div>

{% endblock %}
