{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto">

<section class="bg-slate-800
rounded-2xl p-6">

<h1 class="text-3xl
font-bold mb-6">

Login

</h1>

<form method="POST"
class="space-y-4">

<input type="email"
name="email"
placeholder="Email"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<input type="password"
name="password"
placeholder="Password"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<button class="w-full
bg-cyan-500
rounded-xl py-3">

Login

</button>

</form>

<div class="mt-4 text-center">

<a href="{{ url_for('forgot_password') }}"
class="text-cyan-400">

Forgot Password?

</a>

</div>

<div class="mt-4 text-center">

<a href="{{ url_for('signup') }}"
class="text-cyan-400">

Create Account

</a>

</div>

</section>

</div>

{% endblock %}
