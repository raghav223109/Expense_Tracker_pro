{% extends "base.html" %}

{% block content %}

<h1 class="text-4xl
font-bold mb-6">

Dashboard

</h1>

<div class="bg-slate-800
rounded-2xl p-6 mb-6">

<h2 class="text-2xl
font-bold">

Total Expenses

</h2>

<p class="text-4xl
text-cyan-400
font-bold mt-4">

${{ "%.2f"|format(total) }}

</p>

</div>

<section class="bg-slate-800
rounded-2xl p-6">

<h2 class="text-2xl
font-bold mb-4">

Add Expense

</h2>

<form method="POST"
action="/add"
class="space-y-4">

<input type="text"
name="description"
placeholder="Description"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<input type="number"
step="0.01"
name="amount"
placeholder="Amount"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<input type="date"
name="date"
value="{{ today }}"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<select name="category"
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

{% for c in categories %}

<option value="{{ c }}">
{{ c }}
</option>

{% endfor %}

</select>

<button class="w-full
bg-cyan-500
rounded-xl py-3">

Add Expense

</button>

</form>

</section>

{% endblock %}
