<!DOCTYPE html>

<html lang="en" class="dark">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>
Expense Tracker Pro
</title>

<!-- TAILWIND CSS -->

<script src="https://cdn.tailwindcss.com"></script>

<!-- PWA -->

<link rel="manifest"
href="{{ url_for('static', filename='manifest.json') }}">

<!-- CUSTOM CSS -->

<link rel="stylesheet"
href="{{ url_for('static', filename='styles.css') }}">

<!-- THEME COLOR -->

<meta name="theme-color"
content="#06b6d4">

</head>

<body class="bg-slate-900
text-slate-100 min-h-screen">

<!-- HEADER -->

<header class="border-b
border-slate-800">

<div class="max-w-7xl
mx-auto px-4 py-4
flex justify-between
items-center">

<h1 class="text-2xl
font-bold">

<span class="text-cyan-400">
Expense
</span>

Tracker Pro

</h1>

<!-- THEME BUTTON -->

<button id="themeToggle"
class="bg-slate-800
border border-slate-700
px-4 py-2 rounded-xl
hover:bg-slate-700">

🌙 Theme

</button>

</div>

</header>

<!-- MAIN -->

<main class="max-w-7xl
mx-auto p-4">

<!-- FLASH MESSAGES -->

{% with messages =
get_flashed_messages(
with_categories=true) %}

{% if messages %}

{% for category, message
in messages %}

<div class="mb-4
rounded-xl p-4

{% if category == 'success' %}

bg-emerald-500/20
border border-emerald-500/30
text-emerald-200

{% elif category == 'error' %}

bg-rose-500/20
border border-rose-500/30
text-rose-200

{% else %}

bg-slate-800
border border-slate-700

{% endif %}
">

{{ message }}

</div>

{% endfor %}

{% endif %}

{% endwith %}

<!-- PAGE CONTENT -->

{% block content %}
{% endblock %}

</main>

<!-- DARK/LIGHT MODE -->

<script>

const html =
document.documentElement;

const toggle =
document.getElementById(
'themeToggle'
);


// LOAD SAVED THEME

const savedTheme =
localStorage.getItem('theme');

if (savedTheme === 'light') {

html.classList.remove('dark');

document.body.classList.remove(
'bg-slate-900',
'text-slate-100'
);

document.body.classList.add(
'bg-white',
'text-black'
);

}


// TOGGLE THEME

toggle.addEventListener(
'click',
() => {

html.classList.toggle('dark');

if (
html.classList.contains('dark')
) {

localStorage.setItem(
'theme',
'dark'
);

document.body.classList.remove(
'bg-white',
'text-black'
);

document.body.classList.add(
'bg-slate-900',
'text-slate-100'
);

toggle.innerHTML =
'🌙 Theme';

}

else {

localStorage.setItem(
'theme',
'light'
);

document.body.classList.remove(
'bg-slate-900',
'text-slate-100'
);

document.body.classList.add(
'bg-white',
'text-black'
);

toggle.innerHTML =
'☀️ Theme';

}

});

</script>


<!-- SERVICE WORKER -->

<script>

if ('serviceWorker' in navigator) {

window.addEventListener(
'load',
() => {

navigator.serviceWorker
.register('/static/sw.js')

.then(registration => {

console.log(
'Service Worker Registered'
);

})

.catch(error => {

console.log(
'Service Worker Failed',
error
);

});

});

}

</script>

</body>

</html>
