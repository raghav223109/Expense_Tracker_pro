{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto">

<section class="bg-slate-800
rounded-2xl p-6">

<h1 class="text-3xl
font-bold mb-6">

Edit Expense

</h1>

<form method="POST"
class="space-y-4">

<input type="text"
name="description"
value="{{ expense.description }}"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<input type="number"
step="0.01"
name="amount"
value="{{ expense.amount }}"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<input type="date"
name="date"
value="{{ expense.date }}"
required
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

<select name="category"
class="w-full
bg-slate-900
rounded-xl
px-4 py-3">

{% for c in categories %}

<option value="{{ c }}"
{% if expense.category == c %}
selected
{% endif %}>

{{ c }}

</option>

{% endfor %}

</select>

<button class="w-full
bg-cyan-500
rounded-xl py-3">

Update Expense

</button>

</form>

</section>

</div>

{% endblock %}
